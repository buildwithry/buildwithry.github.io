<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#14342b"/>
    </linearGradient>
    <linearGradient id="accS" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <marker id="arrS" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bgS)"/>
  <text x="60" y="78" fill="#fff" font-size="38" font-weight="700">Shopify Inventory Planner</text>
  <text x="60" y="116" fill="url(#accS)" font-size="22" font-weight="600">Demand forecasting &amp; reorder engine</text>

  <g text-anchor="middle">
    <rect x="60" y="200" width="190" height="110" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="155" y="244" fill="#e2e8f0" font-size="17" font-weight="600">Shopify exports</text>
    <text x="155" y="270" fill="#7dd3fc" font-size="13">orders · inventory</text>
    <text x="155" y="290" fill="#7dd3fc" font-size="13">lead times · promos</text>

    <rect x="405" y="195" width="190" height="120" rx="14" fill="url(#accS)"/>
    <text x="500" y="238" fill="#06281f" font-size="18" font-weight="700">Python model</text>
    <text x="500" y="264" fill="#06281f" font-size="13">velocity · safety stock</text>
    <text x="500" y="284" fill="#06281f" font-size="13">reorder point</text>
    <text x="500" y="304" fill="#06281f" font-size="13">stock-out / order-by</text>

    <rect x="750" y="170" width="190" height="80" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="845" y="205" fill="#e2e8f0" font-size="16" font-weight="600">Excel dashboard</text>
    <text x="845" y="227" fill="#7dd3fc" font-size="13">live formulas</text>

    <rect x="750" y="280" width="190" height="80" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="845" y="315" fill="#e2e8f0" font-size="16" font-weight="600">Weekly update</text>
    <text x="845" y="337" fill="#7dd3fc" font-size="13">order / at-risk / fine</text>
  </g>

  <!-- status legend -->
  <g font-size="15" font-weight="600">
    <circle cx="80" cy="430" r="9" fill="#ef4444"/><text x="98" y="436" fill="#e2e8f0">REORDER NOW</text>
    <circle cx="290" cy="430" r="9" fill="#f59e0b"/><text x="308" y="436" fill="#e2e8f0">ORDER SOON</text>
    <circle cx="500" cy="430" r="9" fill="#22c55e"/><text x="518" y="436" fill="#e2e8f0">OK</text>
    <circle cx="600" cy="430" r="9" fill="#3b82f6"/><text x="618" y="436" fill="#e2e8f0">OVERSTOCK</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrS)">
    <path d="M250 255 L403 255"/>
    <path d="M595 240 L748 215"/>
    <path d="M595 270 L748 310"/>
  </g>
</svg>
