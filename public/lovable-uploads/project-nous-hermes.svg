<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrH" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#bgH)"/>
  <text x="60" y="78" fill="#fff" font-size="38" font-weight="700">Nous Hermes</text>
  <text x="60" y="116" fill="url(#accH)" font-size="22" font-weight="600">Autonomous AI Job-Hunter Agent</text>

  <!-- VPS container -->
  <rect x="60" y="160" width="880" height="380" rx="18" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="84" y="192" fill="#94a3b8" font-size="18" font-weight="600">Hostinger VPS · Docker · runs 24/7</text>

  <!-- Hermes core -->
  <rect x="400" y="300" width="200" height="100" rx="16" fill="url(#accH)"/>
  <text x="500" y="345" fill="#0f172a" font-size="22" font-weight="700" text-anchor="middle">Hermes Agent</text>
  <text x="500" y="372" fill="#0f172a" font-size="15" text-anchor="middle">reason · score · learn</text>

  <!-- Satellites -->
  <g font-size="16" font-weight="600" text-anchor="middle">
    <rect x="90" y="230" width="190" height="62" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="185" y="260" fill="#e2e8f0">Telegram</text>
    <text x="185" y="280" fill="#7dd3fc" font-size="13">talk to it anytime</text>

    <rect x="90" y="408" width="190" height="62" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="185" y="438" fill="#e2e8f0">Scheduler</text>
    <text x="185" y="458" fill="#7dd3fc" font-size="13">6PM + 1AM daily</text>

    <rect x="720" y="230" width="190" height="62" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="815" y="260" fill="#e2e8f0">4 job boards</text>
    <text x="815" y="280" fill="#7dd3fc" font-size="13">scrape twice/day</text>

    <rect x="720" y="408" width="190" height="62" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="815" y="438" fill="#e2e8f0">Persistent memory</text>
    <text x="815" y="458" fill="#7dd3fc" font-size="13">never repeats a job</text>

    <rect x="405" y="200" width="190" height="56" rx="12" fill="#1e293b" stroke="#f59e0b"/>
    <text x="500" y="234" fill="#fbbf24">Claude Haiku</text>
  </g>

  <!-- connectors -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrH)">
    <path d="M280 261 L398 320"/>
    <path d="M280 439 L398 380"/>
    <path d="M720 261 L602 320"/>
    <path d="M720 439 L602 380"/>
    <path d="M500 300 L500 258"/>
  </g>
</svg>
